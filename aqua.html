.downloader-container {
  background: #1b1b1e;
  margin-top: 20px;
  padding: 20px;
  border-radius: 12px;
  border: 1px solid #333;
  box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
  display: none;
}

.downloader-status {
  display: flex;
  gap: 20px;
  margin-bottom: 20px;
  flex-wrap: wrap;
}

.status-box {
  flex: 1;
  min-width: 120px;
  background: #121212;
  padding: 16px;
  border-radius: 8px;
  text-align: center;
  border: 1px solid #2c2c2c;
  transition: transform 0.3s;
}

.status-box:hover {
  transform: translateY(-3px);
}

.status-title {
  font-size: 14px;
  font-weight: bold;
  margin-bottom: 8px;
  text-transform: uppercase;
}

.status-value {
  font-size: 20px;
  font-weight: bold;
}

.active-status {
  border-top: 3px solid #00ffab;
  position: relative;
}

.inactive-status {
  border-top: 3px solid #ff4141;
  position: relative;
}


.status-box::before {
  content: '';
  position: absolute;
  top: 8px;
  left: 8px;
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: #00ffab;
  animation: pulse 1.5s infinite;
}

.inactive-status::before {
  background: #ff4141;
  animation: none;
}

@keyframes pulse {
  0% {
    transform: scale(0.8);
    opacity: 0.7;
  }
  50% {
    transform: scale(1);
    opacity: 1;
  }
  100% {
    transform: scale(0.8);
    opacity: 0.7;
  }
}

.downloader-table {
  border: 1px solid #333;
  border-radius: 8px;
  overflow: hidden;
}

.downloader-header,
.downloader-row {
  display: flex;
  justify-content: space-between;
  padding: 12px 16px;
  align-items: center;
}

.downloader-header {
  background: #292929;
  font-weight: bold;
  text-transform: uppercase;
}

.downloader-row:nth-child(even) {
  background: rgba(255, 255, 255, 0.03);
}

.downloader-col {
  flex: 1;
  color: #ffffff;
  font-size: 13px;
  padding: 8px 12px; 
}

.downloader-col:last-child {
  text-align: right; 
  padding-right: 20px; 
}

.run-btn {
  background-color: #00d1ff;
  border: none;
  border-radius: 5px;
  color: #fff;
  padding: 6px 12px;
  cursor: pointer;
  font-size: 12px;
  transition: background-color 0.3s ease;
  margin-left: 10px; 
}

.run-btn:hover {
  background-color: #00ffab;
}

.active-status {
  position: relative;
  overflow: hidden;
}

.active-status::after {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: linear-gradient(45deg, rgba(0, 255, 171, 0.1), rgba(0, 255, 171, 0.05));
  z-index: 1;
  pointer-events: none;
}

.active-status .status-title {
  color: #00ffab;
}

.active-status .status-value {
  color: #00ffab;
}

        data: [],
        borderColor: '#00d1ff',
        backgroundColor: 'rgba(0, 209, 255, 0.2)',
        borderWidth: 2,
        tension: 0.3
      }]
    };
    const config = {
      type: 'line',
      data: data,
      options: {
        responsive: true,
        plugins: {
          legend: {
            display: true,
            labels: {
              color: '#ffffff'
            }
          }
        },
        scales: {
          x: { ticks: { color: '#ffffff' }, grid: { color: '#333' } },
          y: { ticks: { color: '#ffffff' }, grid: { color: '#333' } }
        }
      }
    };
    const realTimeChart = new Chart(ctx, config);
    setInterval(() => {
      const currentTime = new Date().toLocaleTimeString();
      if (data.labels.length > 10) {
        data.labels.shift();
        data.datasets[0].data.shift();
      }
      data.labels.push(currentTime);
      data.datasets[0].data.push(Math.random() * 100);
      realTimeChart.update();
    }, 1000);
    
    const now = new Date();
    const formattedDate = now.toLocaleString('en-US', {
      year: 'numeric',
      day: 'numeric',
      hour: '2-digit',
      minute: '2-digit',
      second: '2-digit',
      hour12: true
    });
    const dateElements = document.querySelectorAll('.changelog-content .date');
    dateElements.forEach(el => {
      el.textContent = `${formattedDate}`;
    });
  </script>
</body>
</html>
